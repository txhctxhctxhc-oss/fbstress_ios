name: Build MetalStress IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain info
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep iphoneos

      - name: Build (no signing)
        run: |
          xcodebuild \
            -project MetalStress.xcodeproj \
            -scheme MetalStress \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: Package .app → unsigned .ipa
        run: |
          APP_PATH=$(find build/DerivedData -name "MetalStress.app" | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p ipa_staging/Payload
          cp -r "$APP_PATH" ipa_staging/Payload/
          cd ipa_staging
          zip -r ../MetalStress-unsigned.ipa Payload
          cd ..
          echo "IPA size: $(du -sh MetalStress-unsigned.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MetalStress-unsigned-ipa
          path: MetalStress-unsigned.ipa
          retention-days: 30